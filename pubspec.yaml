name: jadosoft_admin
description: "A new Flutter project."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management & architecture
  flutter_bloc: ^9.1.1
  dartz: ^0.10.1
  get_it: ^9.2.1
  go_router: ^17.1.0
  equatable: ^2.0.8

  # Networking & storage
  dio: ^5.9.1
  flutter_secure_storage: ^10.0.0
  shared_preferences: ^2.5.4

  # Database
  drift: ^2.31.0
  sqlite3_flutter_libs: ^0.6.0+eol
  path_provider: ^2.1.0
  path: ^1.9.0

  # UI & charts
  fl_chart: ^1.1.1
  intl: ^0.20.2

  # Media & files
  image_picker: ^1.2.1
  image: ^4.3.0
  file_picker: ^10.3.10
  open_file: ^3.5.11
  share_plus: ^12.0.1

  # Utilities
  url_launcher: ^6.3.2

  # Location
  location: ^8.0.1
  geolocator: ^10.1.0

  # Documents
  pdf: ^3.12.0
  excel: ^4.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  drift_dev: ^2.22.0
  build_runner: ^2.4.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/icon.png
